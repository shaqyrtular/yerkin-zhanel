<html lang="kk"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Той — Админка</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&amp;family=Great+Vibes&amp;family=Montserrat:wght@300;400;500&amp;display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#faf6f0;font-family:'Montserrat',sans-serif;color:#3d2c24;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border:1px solid rgba(150,110,90,.14);border-radius:24px;padding:40px 32px;max-width:360px;width:100%;text-align:center;box-shadow:0 16px 48px rgba(100,60,40,.09)}
.card-label{font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:#9b7560;margin-bottom:16px}
.couple{font-family:'Great Vibes',cursive;font-size:46px;color:#7a1e2e;line-height:1;margin-bottom:6px}
.wedding-date{font-family:'Cormorant Garamond',serif;font-size:15px;color:#9b7560;letter-spacing:.08em;margin-bottom:32px}
.divider{height:1px;background:rgba(122,98,88,.15);margin-bottom:28px}
.counter-label{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:#9b7560;margin-bottom:12px}
.counter{font-family:'Great Vibes',cursive;font-size:96px;line-height:1;color:#7a1e2e;margin-bottom:6px;transition:transform .3s ease}
.counter.bump{transform:scale(1.15)}
.counter-sub{font-family:'Cormorant Garamond',serif;font-size:16px;color:#9b7560;font-style:italic;margin-bottom:32px}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#22c55e;margin-right:6px;animation:pulse 1.5s infinite}
.status{margin-top:16px;font-family:'Cormorant Garamond',serif;font-size:13px;color:#b8a090;min-height:20px;display:flex;align-items:center;justify-content:center;gap:4px}
.reset-wrap{margin-top:28px;padding-top:24px;border-top:1px solid rgba(122,98,88,.1)}
.reset-btn{background:none;border:none;font-family:'Cormorant Garamond',serif;font-size:13px;color:rgba(155,117,96,.5);cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.reset-btn:hover{color:#9b7560}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div class="card">
  <p class="card-label">Админка</p>
  <p class="couple">Еркін &amp; Жанель</p>
  <p class="wedding-date">5 шілде 2026 • Baq Sarai</p>

  <div class="divider"></div>

  <p class="counter-label">🤍 Келемін деді</p>
  <p class="counter" id="count">—</p>
  <p class="counter-sub">қонақ</p>

  <div class="status">
    <span class="dot"></span>
    <span id="status">Тікелей • 00:00:00</span>
  </div>
</div>

<script>
const FB = 'https://shaqyrtu-yerkin-default-rtdb.firebaseio.com';

// Realtime слушатель — Firebase SSE
const es = new EventSource(`${FB}/rsvp/yes.json`);

es.addEventListener('put', e => {
  const val = JSON.parse(e.data).data;
  updateDisplay(val === null ? 0 : val);
});

es.addEventListener('patch', e => {
  const val = JSON.parse(e.data).data;
  if (val !== null) updateDisplay(val);
});

es.onerror = () => {
  document.getElementById('status').textContent = 'Байланыс үзілді...';
};

function updateDisplay(val) {
  const el = document.getElementById('count');
  el.textContent = val;
  // Анимация при изменении
  el.classList.remove('bump');
  void el.offsetWidth;
  el.classList.add('bump');
  setTimeout(() => el.classList.remove('bump'), 300);

  const now  = new Date();
  const time = now.toLocaleTimeString('kk-KZ', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  document.getElementById('status').textContent = `Тікелей • ${time}`;
}
</script>


</body></html>
